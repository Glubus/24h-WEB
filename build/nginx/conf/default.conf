server {
    listen 80;
    server_name _;

    root /app/sfapi/public;
    index index.php;

    # Normalise /api -> /api/
    location = /api {
        return 301 /api/;
    }

    # Tout ce qui commence par /api/ va vers Symfony
    location ^~ /api/ {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /bundles/ {
        try_files $uri /index.php$is_args$args;
    }

    # Front controller Symfony (accessible seulement en interne)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass sfapi:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bloque l'exécution directe des .php
    location ~ \.php$ {
        return 404;
    }

    # Tout le reste va vers React (Vite sur 5173)
    location / {
        proxy_pass http://web:5173;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HMR / WebSocket Vite
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/sfapi_error.log;
    access_log /var/log/nginx/sfapi_access.log;
}