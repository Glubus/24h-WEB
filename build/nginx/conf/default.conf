server {
    root /app/sfapi/public;
    index index.php;
    location / {
        #try_files $uri /index.php$is_args$args;
        try_files $uri $uri/ /index.php?q=$uri&$args;
    }

    # Symfony API Platform - Serve static files and API endpoints
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Deny access to PHP files in uploads and other directories
    location ~ \.php$ {
        deny all;
    }

    error_log /var/log/nginx/sfapi_error.log;
    access_log /var/log/nginx/sfapi_access.log;
}