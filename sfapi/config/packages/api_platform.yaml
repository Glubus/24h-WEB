api_platform:
    title: Hello API Platform
    version: 1.0.0
    show_webby: false
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        html:
            mime_types: ['text/html']
        yaml:
            mime_types: ['text/yaml']
    defaults:
        stateless: true
        security: 'is_granted("IS_AUTHENTICATED_FULLY")'
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    swagger:
        api_keys:
            access_token:
                type: header
                name: Authorization

when@test:
    api_platform:
        defaults:
            # Disable auth requirement during tests so existing tests keep passing
            security: 'is_granted("IS_AUTHENTICATED_FULLY")'